<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NongHyup Mobile - UI Screens</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: #1a1a2e;
      min-height: 100vh;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      align-items: flex-start;
      gap: 40px;
      padding: 40px 20px;
    }

    .screen { flex-shrink: 0; }

    .device-frame {
      width: 430px;
      background: #111;
      border-radius: 54px;
      padding: 16px;
      box-shadow: 0 0 0 2px #333, 0 0 0 4px #111, 0 30px 80px rgba(0,0,0,0.6), inset 0 0 4px rgba(255,255,255,0.05);
    }

    .device-screen {
      border-radius: 40px;
      overflow: hidden;
      position: relative;
      background: #f5f5f5;
    }

    .device-notch {
      position: absolute;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      width: 126px;
      height: 36px;
      background: #111;
      border-radius: 20px;
      z-index: 10;
    }

    .device-screen img {
      width: 100%;
      display: block;
    }

    .screen-label {
      text-align: center;
      color: rgba(255,255,255,0.5);
      font-size: 13px;
      font-weight: 500;
      margin-top: 16px;
      letter-spacing: 0.5px;
    }

    .screen-divider { display: none; }

    @media (max-width: 500px) {
      body {
        background: #f5f5f5;
        padding: 0;
        gap: 0;
        flex-direction: column;
        align-items: stretch;
      }

      .device-frame {
        width: 100%;
        background: none;
        border-radius: 0;
        padding: 0;
        box-shadow: none;
      }

      .device-screen { border-radius: 0; }
      .device-notch, .screen-label { display: none; }

      .screen-divider {
        display: block;
        height: 40px;
        background: #e5e5e5;
        position: relative;
      }

      .screen-divider::before {
        content: '';
        position: absolute;
        top: 0; left: 0; right: 0;
        height: 8px;
        background: linear-gradient(to bottom, rgba(0,0,0,0.06), transparent);
      }

      .screen-divider::after {
        content: '';
        position: absolute;
        bottom: 0; left: 0; right: 0;
        height: 8px;
        background: linear-gradient(to top, rgba(0,0,0,0.06), transparent);
      }
    }
  </style>
</head>
<body>

  <div class="screen">
    <div class="device-frame"><div class="device-screen">
